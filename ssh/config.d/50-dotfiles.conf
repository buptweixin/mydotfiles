# Shared SSH defaults for interactive shell and tmux workflows.

Host *
  ServerAliveInterval 30
  ServerAliveCountMax 6
  TCPKeepAlive yes
  ControlMaster auto
  ControlPersist 10m
  ControlPath ~/.ssh/controlmasters/%C
  HashKnownHosts yes
  StrictHostKeyChecking ask

Host *
  IgnoreUnknown UseKeychain
  AddKeysToAgent yes
  UseKeychain yes
